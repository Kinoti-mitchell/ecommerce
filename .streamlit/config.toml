# High-contrast defaults so Streamlit chrome matches the custom dark UI.
[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#ffffff"
linkColor = "#7dd3fc"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#ffffff"
linkColor = "#7dd3fc"

[client]
toolbarMode = "minimal"
